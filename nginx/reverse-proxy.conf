server {
    listen 80;
    server_name _;

    # Route to frontend SPA
    location / {
        proxy_pass http://trainee_frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Route API to backend
    location /api/ {
        proxy_pass http://trainee_backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}